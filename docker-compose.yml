version: '3.8'

services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: warehouse_postgres_db
    restart: always
    environment:
      POSTGRES_DB: warehouse_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Automatically initialize database schema if folder contains init script
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seeds.sql:/docker-entrypoint-initdb.d/2-seeds.sql

  # 2. pgAdmin GUI for Database Management
  pgadmin:
    image: dpage/pgadmin4
    container_name: warehouse_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@warehouse.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - db

  # 3. Node.js Express Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: warehouse_backend_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/warehouse_db
      - JWT_SECRET=super_secret_warehouse_key
      - USE_MOCK_DB=false
    depends_on:
      - db

  # 4. Next.js Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: warehouse_frontend_ui
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  pgdata:
